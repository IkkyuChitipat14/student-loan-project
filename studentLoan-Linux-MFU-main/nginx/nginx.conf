server {
    listen 8010;
    listen [::]:8010;
    server_name localhost;

    # Serve static files
    location / {
        root   /usr/share/nginx/html;
	try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend service
    location /api/ {
        # Remove /api/ from the URL path and proxy the request
        proxy_pass http://192.168.10.179:8050/;

        # Set the headers for proper forwarding
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Handle redirects (in case the backend sends a redirect with the wrong hostname)
        proxy_redirect off;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

